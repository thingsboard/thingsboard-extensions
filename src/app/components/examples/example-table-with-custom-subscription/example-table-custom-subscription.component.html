<div class="example-table gap-2 flex flex-col">
  <div class="header">
    Active devices
  </div>
  <div class="content">
    @for (key of tableValues | keyvalue; track key) {
      <div class="content-column flex flex-row items-center justify-between">
        <div class="content-key">{{ key.key }}</div>
        <div class="content-value">{{ key.value }}</div>
      </div>
    }
  </div>
</div>
