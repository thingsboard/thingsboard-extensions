<div class="example-table gap-2 flex flex-col">
  <div class="header">
    {{ entityName }}
  </div>
  <div class="content">
    @for (key of tableValues | keyvalue; track key) {
      <div class="content-column flex flex-row items-center justify-between" [style.height]="columnHeight + 'px'">
        <div class="flex items-center gap-2">
          @if (key.value.icon.showIcon) {
            <tb-icon [style]="key.value.icon.iconStyles" [style.color]="key.value.icon.iconColor.color">
              {{ key.value.icon.icon }}
            </tb-icon>
          }
          <div class="key" [style]="keyStyle" [style.color]="keyColor.color">
            {{ key.key }}
          </div>
        </div>
        <div [style]="valueStyle" [style.color]="valueColor.color">{{ key.value.data }}</div>
      </div>
    }
  </div>
</div>
